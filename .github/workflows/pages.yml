# Deploys the STATIC REBUILD PROTOTYPE (fitcollege-rebuild/) to GitHub Pages.
# MANUAL-ONLY by design: the live demo on Pages is the Next.js site deployed by
# deploy-pages.yml from the claude/quirky-mendel-jc9321 branch (side-scrolling
# banners + map homepage). Do NOT add a push trigger here — it would overwrite
# that demo, which is what happened when PR #1 merged.
# index.html (review hub) is this prototype's landing page if you do run it.
name: Deploy static rebuild prototype (manual only)

on:
  workflow_dispatch: {}   # run manually from the Actions tab when you explicitly want the prototype on Pages

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: fitcollege-rebuild
      - id: deployment
        uses: actions/deploy-pages@v4
